pre-commit:
  parallel: false
  commands:
    ensure-sync:
      glob: "*.php"
      run: |
        [ -f examples/schema.docs.graphql ] || curl -fsSL -o examples/schema.docs.graphql https://docs.github.com/public/fpt/schema.docs.graphql
        bin/graphql-client-code-generator --config=examples/config.php --config=tests/config.php --ensure-sync

    sync-readme-examples:
      glob:
        - "*.php"
        - "*.md"
      run: vendor/bin/readme-examples-sync
      stage_fixed: true

    composer-validate:
      glob:
        - "composer.json"
        - "composer.lock"
      run: composer validate --strict

    composer-normalize:
      glob: "composer.json"
      run: composer normalize --diff
      stage_fixed: true

    composer-dependency-analyser:
      glob:
        - "*.php"
        - "composer.json"
        - "composer.lock"
      run: vendor/bin/composer-dependency-analyser

    php-cs-fixer:
      glob: "*.php"
      exclude:
        - "**/Generated/**"
      run: vendor/bin/php-cs-fixer fix --config .php-cs-fixer.php -- {staged_files}
      stage_fixed: true

    twig-cs-fixer:
      glob: "*.twig"
      run: vendor/bin/twig-cs-fixer fix -- {staged_files}
      stage_fixed: true

    phpstan:
      glob:
      - "*.php"
      - "*.neon"
      run: vendor/bin/phpstan

    phpunit:
      glob: "*.php"
      run: vendor/bin/phpunit
